<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>네이버 지도 테스트</title>
  <style>
    #map { width: 100%; height: 500px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    // NAVER_MAP_CLIENT_ID를 직접 입력
    const CLIENT_ID = '여기에_NAVER_MAP_CLIENT_ID_입력';
  </script>
  <script
    src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=여기에_NAVER_MAP_CLIENT_ID_입력"
    onload="initMap()"
    onerror="document.body.innerHTML='<h2 style=color:red>키 오류 또는 도메인 미등록</h2>'">
  </script>
  <script>
    function initMap() {
      new naver.maps.Map('map', {
        center: new naver.maps.LatLng(37.5665, 126.978),
        zoom: 14
      });
      document.title = '✅ 네이버 지도 정상';
    }
  </script>
</body>
</html>
