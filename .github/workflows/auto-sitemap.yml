name: Auto Sitemap
on:
  push:
    branches: [main]
    paths:
      - 'src/App.jsx'

jobs:
  sitemap:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '자동 사이트맵')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract pages and update sitemap
        run: |
          export TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)

          python3 << 'PYEOF'
          import re, os, urllib.parse

          with open("src/App.jsx", "r", encoding="utf-8") as f:
            code = f.read()

          # SLUGS 객체에서 slug 이름 추출 (값이 한글 계산기명)
          m = re.search(r'const SLUGS\s*=\s*\{([^}]+)\}', code)
          if not m:
            print("SLUGS not found")
            exit(1)

          slugs_raw = m.group(1)
          slugs = re.findall(r'"([^"]+)"', slugs_raw)
          if not slugs:
            slugs = [v for v in re.findall(r':\"([^"]+)\"', slugs_raw)]
          if not slugs:
            # fallback: key:"value" 형태
            slugs = [v for _, v in re.findall(r'(\w+):"([^"]+)"', slugs_raw)]

          today = os.environ["TODAY"]
          domain = "https://xn--989a00a691bdfa717h.com"

          # 정적 페이지
          urls = [
            f'  <url><loc>{domain}/</loc><lastmod>{today}</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>',
            f'  <url><loc>{domain}/about</loc><lastmod>{today}</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>',
            f'  <url><loc>{domain}/info</loc><lastmod>{today}</lastmod><changefreq>weekly</changefreq><priority>0.7</priority></url>',
            f'  <url><loc>{domain}/market</loc><lastmod>{today}</lastmod><changefreq>weekly</changefreq><priority>0.7</priority></url>',
            f'  <url><loc>{domain}/community</loc><lastmod>{today}</lastmod><changefreq>daily</changefreq><priority>0.7</priority></url>',
          ]

          # 계산기 페이지 (pathname 기반, 해시 없음)
          for slug in slugs:
            encoded = urllib.parse.quote(slug)
            urls.append(f'  <url><loc>{domain}/{encoded}</loc><lastmod>{today}</lastmod><changefreq>weekly</changefreq><priority>0.9</priority></url>')

          sitemap = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n' + "\n".join(urls) + "\n</urlset>\n"

          with open("public/sitemap.xml", "w", encoding="utf-8") as f:
            f.write(sitemap)

          print(f"Sitemap updated: {len(urls)} URLs (pathname-based, no hash)")
          PYEOF

      - name: Commit
        run: |
          git config user.name "Auto Sitemap"
          git config user.email "auto@lifecalculator.com"
          git add public/sitemap.xml
          git diff --staged --quiet || (git commit -m "자동 사이트맵 갱신" && git push)
