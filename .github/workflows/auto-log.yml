name: Auto Update Log
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/data/**'
      - 'index.html'

jobs:
  log:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '자동')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate log
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y.%m.%d)
          TITLE=$(git log -1 --pretty=format:"%s" --no-merges)

          CATEGORY="전체"
          if echo "$TITLE" | grep -qi "취득세\|양도세\|증여세\|상속세\|종부세\|재산세\|종소세\|연말정산\|세금"; then
            CATEGORY="세금"
          elif echo "$TITLE" | grep -qi "DSR\|DTI\|LTV\|대출\|mortgage\|loan"; then
            CATEGORY="대출"
          elif echo "$TITLE" | grep -qi "중개\|등기\|법무\|비용\|인지\|채권"; then
            CATEGORY="비용"
          elif echo "$TITLE" | grep -qi "연봉\|실수령\|4대보험\|국민연금\|자동차세\|퇴직\|실업"; then
            CATEGORY="생활"
          elif echo "$TITLE" | grep -qi "경매\|리모델링\|용적률\|건폐율\|수익률"; then
            CATEGORY="부동산"
          fi

          export TODAY TITLE CATEGORY

          python3 << 'PYEOF'
          import json, os

          path = "public/data/live-data.json"
          if not os.path.exists(path):
            exit(0)

          with open(path, "r", encoding="utf-8") as f:
            data = json.load(f)

          data.setdefault("updateLog", [])

          today = os.environ["TODAY"]
          title = os.environ["TITLE"]
          category = os.environ["CATEGORY"]

          if any(l.get("title") == title for l in data["updateLog"]):
            exit(0)

          data["updateLog"].insert(0, {
            "date": today,
            "category": category,
            "title": title,
            "desc": title
          })

          data["updateLog"] = data["updateLog"][:50]

          with open(path, "w", encoding="utf-8") as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
          PYEOF

      - name: Update RSS
        run: |
          TITLE=$(git log -1 --pretty=format:"%s" --no-merges)
          TODAY_RSS=$(TZ=Asia/Seoul date -R)
          GUID="update-$(date +%Y%m%d%H%M)"
          export TITLE TODAY_RSS GUID

          python3 << 'PYEOF'
          import re, os

          path = "public/feed.xml"
          if not os.path.exists(path):
            exit(0)

          with open(path, "r", encoding="utf-8") as f:
            content = f.read()

          title = os.environ["TITLE"]
          today = os.environ["TODAY_RSS"]
          guid = os.environ["GUID"]

          new_item = f"""    <item>
              <title>{title}</title>
              <link>https://xn--989a00a691bdfa717h.com/</link>
              <description>{title}</description>
              <pubDate>{today}</pubDate>
              <guid>https://xn--989a00a691bdfa717h.com/#{guid}</guid>
            </item>"""

          content = re.sub(r"<lastBuildDate>.*?</lastBuildDate>", f"<lastBuildDate>{today}</lastBuildDate>", content)
          content = content.replace("    <item>", new_item + "\n    <item>", 1)

          with open(path, "w", encoding="utf-8") as f:
            f.write(content)
          PYEOF

      - name: Commit
        run: |
          git config user.name "Auto Logger"
          git config user.email "auto@lifecalculator.com"
          git add public/data/live-data.json public/feed.xml
          git diff --staged --quiet || (git commit -m "자동 업데이트 로그 등록" && git push)
