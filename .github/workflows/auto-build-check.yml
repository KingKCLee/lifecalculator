name: Build Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed - no dist folder"
            exit 1
          fi
          echo "Build successful"
