name: Daily Data & Law Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Update live data and verify laws
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print "아래 작업을 순서대로 수행해줘:

          1. public/data/live-data.json의 lastUpdate를 현재 시각(KST)으로 업데이트

          2. 웹 검색으로 아래 5개 영역의 최근 변경사항 확인:
             - 부동산 세법 변경 (취득세/양도세/종부세/재산세/증여세/상속세)
             - 대출 규제 변경 (DSR/DTI/LTV/규제지역)
             - 비용·수수료 변경 (중개보수/인지세/채권/법무사)
             - 정부 부동산·세제 정책 발표
             - 한국은행 기준금리 변동
             - 정책 만료일 변경 확인 (policyDates 필드):
               · transferSurchargeEnd: 양도세 다주택 중과 유예 해제일 (현재 2026-05-10)
               · firstHomeBenefitEnd: 생애최초 취득세 감면 만료일 (현재 2028-12-31)
               · dsr3StepStart: DSR 3단계 시행일
               국회에서 유예 연장 또는 조기 해제 시 live-data.json의 policyDates 업데이트

          3. 변경사항이 있으면 반드시 아래 4가지를 함께 수행할 것:
             (1) public/data/live-data.json의 해당 데이터 수정 (기준금리, 규제지역, policyDates 등)
             (2) src/App.jsx의 UPDATE_LOG 맨 앞에 새 항목 추가. 형식:
                 {date:"YYYY.MM.DD",items:[{cat:"세금|대출|비용|생활|부동산|전체",title:"변경 제목",desc:"상세 내용"}]}
                 계산 로직·GD·TIPS·REGS 수정이 동반되면 함께 반영.
             (3) public/feed.xml의 <channel> 맨 위에 새 <item> 추가 + <lastBuildDate> 갱신
             (4) public/sitemap.xml의 lastmod 오늘 날짜로 변경

          4. 생활경제 달력 업데이트:
             - FOMC 회의 일정, 한국은행 금통위 일정, 미국/한국 CPI 발표일, 미국 고용보고서 발표일 검색
             - 세금 납부 기한 변경 여부 (공휴일 연기 등) 확인
             - econCalendar 해당 월 데이터 업데이트
             - indicators의 current/prev/change/history도 발표 결과 반영

          절대 원칙:
          - 모든 데이터는 공식 출처의 실제 발표값만 사용할 것. 추정값·예측값·임의값 절대 금지.
          - 확인 불가능한 데이터는 null로 두고 '확인 중'으로 표시.
          - kr.investing.com에서 USD/KRW, KOSPI 최신 종가 확인
          - 한국은행(bok.or.kr)에서 기준금리, 국고채 금리 확인
          - 한국부동산원(reb.or.kr)에서 주택매매가격지수 확인
          - 통계청(kostat.go.kr)에서 소비자물가 상승률 확인
          - 연준(federalreserve.gov), BLS(bls.gov)에서 FOMC/CPI/고용 일정 확인

          6. 변경사항 없으면 lastUpdate만 갱신"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Auto Update Bot"
          git config user.email "noble.kclee@gmail.com"
          git add -A
          git commit -m "자동 데이터 업데이트 $(date +%Y-%m-%d)"
          git push
